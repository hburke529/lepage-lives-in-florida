<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Where in the World is Paul LePage?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 16px; }

  body {
    background: #1a2040;
    color: #d4c84a;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 0;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 1000;
  }

  #game {
    width: 1100px;
    max-width: 98vw;
    padding: 12px;
  }

  /* ── Title bar ── */
  .title-bar {
    background: linear-gradient(90deg, #8b1a1a 0%, #b8342e 30%, #d44a2e 50%, #b8342e 70%, #8b1a1a 100%);
    border: 3px solid #e07040;
    padding: 14px 0;
    text-align: center;
    margin-bottom: 6px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }

  .title-bar h1 {
    font-size: 18px;
    color: #ffe066;
    text-shadow: 2px 2px 0 #000, 3px 3px 0 rgba(0,0,0,0.3);
    line-height: 1.9;
    margin: 0;
  }

  .title-bar .sub {
    font-size: 11px;
    color: #ffb366;
    margin-top: 6px;
  }

  /* ── Panels ── */
  .panel-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }

  .panel {
    border: 3px solid #2a7a9e;
    background: #192048;
    padding: 16px;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    flex: 1;
  }

  .panel.narrow { flex: 0 0 250px; }
  .panel.wide { flex: 1; }
  .panel.map-panel { flex: 0 0 280px; min-height: 240px; }

  .panel-label {
    position: absolute;
    top: -1px;
    left: 10px;
    background: #2a7a9e;
    color: #0b0e2a;
    font-size: 10px;
    padding: 4px 10px;
    letter-spacing: 1px;
    font-weight: bold;
  }

  /* ── Dossier ── */
  .dossier {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 20px;
  }

  .dossier-img {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 3px solid #d44a2e;
    box-shadow: 0 0 10px rgba(212,74,46,0.4);
  }

  .dossier-info {
    font-size: 10px;
    color: #5ab8b8;
    line-height: 2.6;
    text-align: center;
  }

  .dossier-info .val { color: #d4c84a; }
  .dossier-info .alert { color: #d44a2e; }

  .wanted-stamp {
    font-size: 20px;
    color: #d44a2e;
    letter-spacing: 8px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    margin-bottom: 8px;
  }

  /* ── Florida map ── */
  .map-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 22px;
  }

  .florida-img {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #2a7a9e;
    box-shadow: 0 0 10px rgba(42,122,158,0.3);
  }

  .map-caption {
    font-size: 10px;
    color: #d44a2e;
    margin-top: 10px;
    text-align: center;
    line-height: 2;
  }

  /* ── Clues ── */
  .intel-panel { padding-top: 22px; }

  .clue-text {
    font-size: 11px;
    line-height: 2.4;
    color: #5ab8b8;
    margin-bottom: 16px;
    padding-left: 16px;
    text-indent: -16px;
  }

  .clue-text .bullet { color: #d44a2e; }

  /* ── Answer buttons ── */
  .choices-panel { padding-top: 22px; }

  .location-btn {
    display: block;
    width: 100%;
    padding: 16px 18px;
    margin: 8px 0;
    background: #1a2040;
    color: #d4c84a;
    border: 3px solid #2a7a9e;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    text-align: left;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.6;
  }

  .location-btn:hover {
    background: #2a7a9e;
    color: #0b0e2a;
    border-color: #5ab8b8;
  }

  .location-btn.correct {
    background: #d4c84a;
    color: #0b0e2a;
    border-color: #d4c84a;
  }

  .location-btn.wrong {
    background: #8b1a1a;
    color: #ffcccc;
    border-color: #d44a2e;
  }

  .location-btn.maine-wrong {
    background: #d44a2e;
    color: #0b0e2a;
    border-color: #e07040;
  }

  /* ── Results ── */
  .result-text {
    font-size: 11px;
    line-height: 2.2;
    margin: 14px 0;
    padding: 14px;
    border: 2px dashed;
  }

  .result-text.correct { color: #d4c84a; border-color: #d4c84a; background: rgba(212,200,74,0.06); }
  .result-text.wrong { color: #e07070; border-color: #d44a2e; background: rgba(212,74,46,0.06); }
  .result-text.maine { color: #e07040; border-color: #e07040; background: rgba(224,112,64,0.06); }

  /* ── Buttons ── */
  .next-btn, .start-btn {
    display: inline-block;
    padding: 14px 28px;
    background: #8b1a1a;
    color: #ffe066;
    border: 3px solid #d44a2e;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.12s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .next-btn:hover, .start-btn:hover {
    background: #d44a2e;
    border-color: #ffe066;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 3px solid #2a7a9e;
    background: #192048;
    padding: 12px 20px;
    margin-top: 6px;
  }

  .score-item {
    font-size: 11px;
    color: #5ab8b8;
  }

  .score-item .val { color: #d4c84a; }

  /* ── Intro ── */
  .intro-text {
    font-size: 11px;
    line-height: 2.4;
    color: #5ab8b8;
    text-align: left;
  }

  .intro-text .hl { color: #d4c84a; }
  .intro-text .warn { color: #d44a2e; }

  .blink { animation: blink 1s step-start infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* ── End screen ── */
  .stat-line {
    font-size: 11px;
    color: #5ab8b8;
    margin: 12px 0;
    line-height: 2.2;
    text-align: left;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(42,122,158,0.2);
  }

  .stat-line .val { color: #d4c84a; }

  .epilogue {
    font-size: 11px;
    color: #e07040;
    line-height: 2.2;
    margin: 16px 0;
    padding: 16px;
    border: 2px solid #d44a2e;
    background: rgba(212,74,46,0.05);
    text-align: left;
  }

  .disclaimer {
    font-size: 7px;
    color: #1a3a5a;
    margin-top: 12px;
    line-height: 2;
    text-align: center;
  }

  .share-btn {
    display: inline-block;
    padding: 14px 28px;
    background: #1a6b4a;
    color: #ffe066;
    border: 3px solid #2ecc71;
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.12s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .share-btn:hover {
    background: #2ecc71;
    border-color: #ffe066;
    color: #0e1228;
  }

  .share-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: #0e1228;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 12px 24px;
    border: 2px solid #ffe066;
    z-index: 2000;
    animation: fadeOut 2s ease-in forwards;
  }

  @keyframes fadeOut {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  .globe-bar {
    height: 4px;
    background: linear-gradient(90deg, #1a2040, #2a7a9e, #5ab8b8, #2a7a9e, #1a2040);
    margin: 3px 0;
  }

  @media (max-width: 800px) {
    html { font-size: 14px; }
    #game { padding: 6px; }
    .panel-row { flex-direction: column; }
    .panel.narrow, .panel.map-panel { flex: unset; }
    .panel { padding: 12px 10px; }
    .title-bar h1 { font-size: 14px; line-height: 1.7; }
    .title-bar .sub { font-size: 9px; }
    .clue-text { font-size: 10px; line-height: 2.2; }
    .location-btn { font-size: 12px; padding: 14px 14px; min-height: 48px; }
    .next-btn, .start-btn, .share-btn { font-size: 11px; padding: 12px 20px; }
    .bottom-bar { flex-direction: column; gap: 10px; padding: 10px; text-align: center; }
    .dossier-img { width: 120px !important; height: auto !important; }
    .florida-img { width: 160px !important; height: auto !important; }
    .intro-text { font-size: 10px; line-height: 2.2; }
    .stat-line { font-size: 10px; }
    .epilogue { font-size: 10px; }
    .panel-label { font-size: 8px; }
  }

  @media (max-width: 480px) {
    html { font-size: 13px; }
    .title-bar h1 { font-size: 11px; }
    .title-bar .sub { font-size: 8px; }
    .location-btn { font-size: 11px; }
    .dossier-img { width: 100px !important; }
    .florida-img { width: 140px !important; }
  }
</style>
</head>

function shareGame(text) {
  const url = window.location.href;
  const shareText = text || "Can YOU find Paul LePage? He's running for Congress in Maine but... (Spoiler: he's not in Maine.) Play 'Where in the World is Paul LePage?'";
  if (navigator.share) {
    navigator.share({ title: 'Where in the World is Paul LePage?', text: shareText, url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText + ' ' + url).then(() => {
      const toast = document.createElement('div');
      toast.className = 'share-toast';
      toast.textContent = 'LINK COPIED!';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }).catch(() => {});
  }
}

function guess(location, btn) {
  if (answered) return;
  answered = true;
  const round = ROUNDS[currentRound];
  const buttons = document.querySelectorAll('.location-btn');

  buttons.forEach(b => {
    b.style.pointerEvents = 'none';
    if (b.textContent.includes(round.answer.toUpperCase())) b.classList.add('correct');
  });

  let resultHTML = '';
  if (location === round.answer) {
    score++;
    btn.classList.add('correct');
    resultHTML = `<div class="result-text correct">${round.correctResponse}</div>`;
  } else if (location === 'Maine') {
    maineGuesses++;
    btn.classList.add('maine-wrong');
    resultHTML = `<div class="result-text maine">\ud83c\udfe0\u2702\ufe0f\ud83d\ude97 ${round.maineResponse}</div>`;
  } else {
    btn.classList.add('wrong');
    resultHTML = `<div class="result-text wrong">${round.wrongResponse}</div>`;
  }

  const answerArea = document.getElementById('answer-area');
  const nextLabel = currentRound < ROUNDS.length - 1 ? '[ NEXT LEAD ]' : '[ CLOSE CASE ]';
  answerArea.innerHTML += `
    ${resultHTML}
    <div style="text-align:center; margin-top:10px;">
      <button class="next-btn" onclick="nextRound()">${nextLabel}</button>
    </div>
  `;
}

function nextRound() {
  currentRound++;
  window.scrollTo(0, 0);
  if (currentRound >= ROUNDS.length) renderEndScreen();
  else renderRound();
}
