<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self' 'unsafe-inline'">
<title>Where in the World is Paul LePage?</title>
<link rel="icon" type="image/png" href="favicon.png">

<!-- Open Graph / Social Share -->
<meta property="og:type" content="website">
<meta property="og:url" content="https://lepagelivesinflorida.com/">
<meta property="og:title" content="Where in the World is Paul LePage?">
<meta property="og:description" content="A residency investigation game. Follow the clues and figure out where Maine's CD-2 candidate actually lives.">
<meta property="og:image" content="https://lepagelivesinflorida.com/og-image.png">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Where in the World is Paul LePage?">
<meta name="twitter:description" content="A residency investigation game. Follow the clues and figure out where Maine's CD-2 candidate actually lives.">
<meta name="twitter:image" content="https://lepagelivesinflorida.com/og-image.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { font-size: 18px; }

  body {
    background: #1a2040;
    color: #d4c84a;
    font-family: 'Press Start 2P', monospace;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 0 60px 0;
    overflow-x: hidden;
  }

  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 1000;
  }

  #game {
    width: 1100px;
    max-width: 98vw;
    padding: 12px;
  }

  /* ── Title bar ── */
  .title-bar {
    background: linear-gradient(90deg, #8b1a1a 0%, #b8342e 30%, #d44a2e 50%, #b8342e 70%, #8b1a1a 100%);
    border: 3px solid #e07040;
    padding: 14px 0;
    text-align: center;
    margin-bottom: 6px;
    box-shadow: 0 3px 12px rgba(0,0,0,0.5);
  }

  .title-bar h1 {
    font-size: 40px;
    color: #ffe066;
    text-shadow: 2px 2px 0 #000, 3px 3px 0 rgba(0,0,0,0.3);
    line-height: 1.9;
    margin: 0;
  }

  .title-bar .sub {
    font-size: 18px;
    color: #ffb366;
    margin-top: 6px;
  }

  /* ── Panels ── */
  .panel-row {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
    align-items: flex-start;
  }

  .panel {
    border: 3px solid #2a7a9e;
    background: #192048;
    padding: 16px;
    position: relative;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    flex: 1;
  }

  .panel.narrow { flex: 0 0 250px; }
  .panel.wide { flex: 1; }
  .panel.map-panel { flex: 0 0 280px; min-height: 300px; align-self: flex-start; }

  .panel-label {
    position: absolute;
    top: -1px;
    left: 10px;
    background: #2a7a9e;
    color: #0b0e2a;
    font-size: 11px;
    padding: 4px 10px;
    letter-spacing: 1px;
    font-weight: bold;
  }

  /* ── Dossier ── */
  .dossier {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding-top: 20px;
  }

  .dossier-img {
    border: 3px solid #d44a2e;
    box-shadow: 0 0 10px rgba(212,74,46,0.4);
  }

  .dossier-info {
    font-size: 11px;
    color: #5ab8b8;
    line-height: 2.6;
    text-align: center;
  }

  .dossier-info .val { color: #d4c84a; }
  .dossier-info .alert { color: #d44a2e; }

  .wanted-stamp {
    font-size: 22px;
    color: #d44a2e;
    letter-spacing: 8px;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.5);
    margin-bottom: 8px;
  }

  /* ── Florida map ── */
  .map-panel {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding-top: 22px;
  }

  .florida-img {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 2px solid #2a7a9e;
    box-shadow: 0 0 10px rgba(42,122,158,0.3);
  }

  .map-caption {
    font-size: 11px;
    color: #d44a2e;
    margin-top: 10px;
    text-align: center;
    line-height: 2;
  }

  /* ── Clues ── */
  .intel-panel { padding-top: 22px; }

  .clue-text {
    font-size: 12px;
    line-height: 2.4;
    color: #5ab8b8;
    margin-bottom: 16px;
    padding-left: 16px;
    text-indent: -16px;
  }

  .clue-text .bullet { color: #d44a2e; }

  /* ── Answer buttons ── */
  .choices-panel { padding-top: 22px; min-height: 320px; }

  .location-btn {
    display: block;
    width: 100%;
    padding: 16px 18px;
    margin: 8px 0;
    background: #1a2040;
    color: #d4c84a;
    border: 3px solid #2a7a9e;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    text-align: left;
    cursor: pointer;
    transition: all 0.12s;
    line-height: 1.6;
  }

  .location-btn:hover {
    background: #2a7a9e;
    color: #0b0e2a;
    border-color: #5ab8b8;
  }

  .location-btn.correct {
    background: #d4c84a;
    color: #0b0e2a;
    border-color: #d4c84a;
  }

  .location-btn.wrong {
    background: #8b1a1a;
    color: #ffcccc;
    border-color: #d44a2e;
  }

  .location-btn.maine-wrong {
    background: #d44a2e;
    color: #0b0e2a;
    border-color: #e07040;
  }

  /* ── Results ── */
  .result-text {
    font-size: 12px;
    line-height: 2.2;
    margin: 14px 0;
    padding: 14px;
    border: 2px dashed;
  }

  .result-text.correct { color: #d4c84a; border-color: #d4c84a; background: rgba(212,200,74,0.06); }
  .result-text.wrong { color: #e07070; border-color: #d44a2e; background: rgba(212,74,46,0.06); }
  .result-text.maine { color: #e07040; border-color: #e07040; background: rgba(224,112,64,0.06); }

  /* ── Buttons ── */
  .next-btn, .start-btn {
    display: inline-block;
    padding: 14px 28px;
    background: #8b1a1a;
    color: #ffe066;
    border: 3px solid #d44a2e;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.12s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .next-btn:hover, .start-btn:hover {
    background: #d44a2e;
    border-color: #ffe066;
  }

  /* ── Bottom bar ── */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 3px solid #2a7a9e;
    background: #192048;
    padding: 12px 20px;
    margin-top: 6px;
  }

  .score-item {
    font-size: 12px;
    color: #5ab8b8;
  }

  .score-item .val { color: #d4c84a; }

  /* ── Intro ── */
  .intro-text {
    font-size: 12px;
    line-height: 2.4;
    color: #5ab8b8;
    text-align: left;
  }

  .intro-text .hl { color: #d4c84a; }
  .intro-text .warn { color: #d44a2e; }

  .blink { animation: blink 1s step-start infinite; }
  @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }

  /* ── End screen ── */
  .stat-line {
    font-size: 12px;
    color: #5ab8b8;
    margin: 12px 0;
    line-height: 2.2;
    text-align: left;
    padding: 8px 14px;
    border-bottom: 1px solid rgba(42,122,158,0.2);
  }

  .stat-line .val { color: #d4c84a; }

  .epilogue {
    font-size: 12px;
    color: #e07040;
    line-height: 2.2;
    margin: 16px 0;
    padding: 16px;
    border: 2px solid #d44a2e;
    background: rgba(212,74,46,0.05);
    text-align: left;
  }

  .disclaimer {
    font-size: 10px;
    color: #5ab8b8;
    margin-top: 12px;
    line-height: 2.2;
    text-align: center;
    max-width: 700px;
    margin-left: auto;
    margin-right: auto;
  }

  .paid-for {
    border: 3px solid #e07040;
    background: #000000;
    color: #ffffff;
    font-size: 12px;
    text-align: center;
    padding: 14px 20px;
    margin-top: 16px;
    margin-bottom: 10px;
    letter-spacing: 2px;
    line-height: 1.8;
    box-shadow: 0 0 10px rgba(224,112,64,0.3);
  }

  .tm-notice {
    font-size: 7px;
    color: #4a6a8a;
    text-align: center;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }

  .share-btn {
    display: inline-block;
    padding: 14px 28px;
    background: #1a6b4a;
    color: #ffe066;
    border: 3px solid #2ecc71;
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.12s;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
  }

  .share-btn:hover {
    background: #2ecc71;
    border-color: #ffe066;
    color: #0e1228;
  }

  .share-toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: #2ecc71;
    color: #0e1228;
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    padding: 12px 24px;
    border: 2px solid #ffe066;
    z-index: 2000;
    animation: fadeOut 2s ease-in forwards;
  }

  @keyframes fadeOut {
    0%, 60% { opacity: 1; }
    100% { opacity: 0; }
  }

  .globe-bar {
    height: 4px;
    background: linear-gradient(90deg, #1a2040, #2a7a9e, #5ab8b8, #2a7a9e, #1a2040);
    margin: 3px 0;
  }

  /* ── Landing page ── */
  .landing {
    text-align: center;
    max-width: 700px;
    margin: 0 auto;
  }

  .landing-photo {
    margin: 20px auto;
  }

  .landing-desc {
    font-size: 13px;
    line-height: 2.4;
    color: #5ab8b8;
    text-align: left;
    padding: 20px;
    border: 3px solid #2a7a9e;
    background: #192048;
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
    margin: 16px 0;
  }

  .landing-desc .hl { color: #d4c84a; }
  .landing-desc .warn { color: #d44a2e; }
  .landing-desc .dim { color: #2a7a9e; font-size: 11px; }

  .landing-buttons {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    flex-wrap: wrap;
  }

  @media (max-width: 800px) {
    html { font-size: 15px; }
    #game { padding: 6px; }
    .panel-row { flex-direction: column; align-items: center; }
    .panel.narrow, .panel.map-panel { flex: unset; width: 100%; max-width: 500px; }
    .panel { padding: 12px 10px; width: 100%; max-width: 500px; }
    .title-bar h1 { font-size: 31px; line-height: 1.7; }
    .title-bar .sub { font-size: 14px; }
    .clue-text { font-size: 11px; line-height: 2.2; }
    .location-btn { font-size: 13px; padding: 14px 14px; min-height: 48px; }
    .next-btn, .start-btn, .share-btn { font-size: 12px; padding: 12px 20px; }
    .bottom-bar { flex-direction: column; gap: 10px; padding: 10px; text-align: center; }
    .dossier-img { width: 200px !important; height: auto !important; }
    .florida-img { width: 160px !important; height: auto !important; }
    .intro-text { font-size: 11px; line-height: 2.2; }
    .landing-desc { font-size: 11px; line-height: 2.2; }
    .stat-line { font-size: 11px; }
    .epilogue { font-size: 11px; }
    .panel-label { font-size: 9px; }
  }

  @media (max-width: 480px) {
    html { font-size: 14px; }
    .title-bar h1 { font-size: 24px; }
    .title-bar .sub { font-size: 12px; }
    .location-btn { font-size: 12px; }
    .dossier-img { width: 160px !important; }
    .florida-img { width: 140px !important; }
  }
</style>
</head>
<body>
<div id="game"></div>

<script>
const PORTRAIT_SRC = 'portrait.png';
const ROUND_PORTRAITS = ['portrait2.png', 'portrait3.png', 'portrait4.png', 'portrait5.png', 'portrait6.png'];
const END_PORTRAIT = 'portrait7.png';
const FLORIDA_SRC = 'florida.png';
const FLORIDA_ROUNDS = ['florida1.png', 'florida2.png', 'florida3.png', 'florida4.png', 'florida5.png'];

const ROUNDS = [
  {
    clues: [
      "PUBLIC RECORDS: LePage spotted buying sunscreen in bulk at a Publix Supermarket. That's not a Maine thing.",
      "SOCIAL MEDIA: LePage seen wearing flip-flops in January. Locals did not find this unusual.",
      "OVERHEARD AT A DINER: \"Yeah, the golf course is great this time of year. Every time of year, actually.\""
    ],
    answer: "Florida",
    locations: ["Maine", "Florida", "New Hampshire", "Massachusetts"],
    correctResponse: "BINGO! He's in Florida. Shocking absolutely no one. Reportedly spotted at an early bird dinner at 4:15 PM.",
    wrongResponse: "Nope. Think sunshine. Think humidity. Think... not Maine.",
    maineResponse: "HA! Maine?! We checked his listed address and found a barbershop and a rental agency. Found good haircuts and a kia sorento, but no Paul LePage."
  },
  {
    clues: [
      "NEWS CLIP: LePage observed complaining about property taxes while paying none in Maine.",
      "LOCAL GOSSIP: \"He's at the place with no state income tax. No, the warm one.\"",
      "RECEIPT SPOTTED: Boca Raton steakhouse. Three nights in a row."
    ],
    answer: "Florida",
    locations: ["Maine", "Florida", "Vermont", "Connecticut"],
    correctResponse: "That's right \u2014 Florida again. Our man loves the Sunshine State almost as much as he loves not being in the 2nd district.",
    wrongResponse: "Wrong! Follow the tan lines. And the complete lack of snow shovels.",
    maineResponse: "Checked the address. Got a new haircut \u2014 how's it look? Oh, and still couldn't find LePage."
  },
  {
    clues: [
      "RUMOR MILL: \"The candidate sends his regards from a state shaped like a gun.\"",
      "EYEWITNESS: LePage seen arguing with an alligator about welfare policy.",
      "FUN FACT: His phone pinged near a place called 'The Villages.' He fit right in."
    ],
    answer: "Florida",
    locations: ["Florida", "Maine", "Texas", "Arizona"],
    correctResponse: "Florida! Three for three! At this point we should just update his Wikipedia page.",
    wrongResponse: "Nope! A state shaped like a gun? Alligators? Come on \u2014 this isn't hard.",
    maineResponse: "We checked the property. Found a fresh fade and a rental car agreement. No former governor in sight."
  },
  {
    clues: [
      "BROWSER HISTORY: Someone googling 'do you have to live in a district to run for Congress there'",
      "SOCIAL MEDIA: LePage seen at a Jimmy Buffett tribute bar. He knew all the words.",
      "HOT TIP: \"Look, I saw him at a Wawa. There are no Wawas in Maine.\""
    ],
    answer: "Florida",
    locations: ["Maine", "New York", "Florida", "California"],
    correctResponse: "It's always Florida. ALWAYS. The man is more Floridian than Florida Man himself.",
    wrongResponse: "Wrong answer! Here's a hint: it's always the same answer. It's ALWAYS the same answer.",
    maineResponse: "We drove to the address. It's still a barbershop. The barber says, and I quote: \"Governor who?\""
  },
  {
    clues: [
      "FINAL CLUE: He's exactly where you think he is.",
      "PHOTO SPOTTED: Man in cargo shorts running for Congress in a district he does not appear to live in.",
      "PUBLIC RECORD: His mail forwarding address is in a state that starts with 'F' and ends with 'lorida.'"
    ],
    answer: "Florida",
    locations: ["Maine", "Florida", "Alaska", "Hawaii"],
    correctResponse: "Case closed. Paul LePage was in Florida. Again. Still. Always. Forever.",
    wrongResponse: "It's Florida. It was always Florida. Were you even reading the clues?",
    maineResponse: "MAINE?! We have been over this. His Maine address is a BARBERSHOP that also rents CARS. The barber is starting to recognize us. This is embarrassing."
  }
];

function shareGame(text) {
  const url = window.location.href;
  const shareText = text || "Can YOU find Paul LePage? He's running for Congress in Maine but... (Spoiler: he's not in Maine.) Play 'Where in the World is Paul LePage?'";
  if (navigator.share) {
    navigator.share({ title: 'Where in the World is Paul LePage?', text: shareText, url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText + ' ' + url).then(() => {
      const toast = document.createElement('div');
      toast.className = 'share-toast';
      toast.textContent = 'LINK COPIED!';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }).catch(() => {});
  }
}

let currentRound = 0;
let score = 0;
let maineGuesses = 0;
let answered = false;

// ─── LANDING PAGE ───
function renderTitleScreen() {
  document.getElementById('game').innerHTML = `
    <div class="landing">
      <div class="title-bar">
        <h1>WHERE IN THE WORLD IS<br>PAUL LePAGE?</h1>
        <div class="sub">A RESIDENCY INVESTIGATION GAME</div>
      </div>
      <div class="globe-bar"></div>

      <div class="landing-photo">
        <img src="${PORTRAIT_SRC}" class="dossier-img" width="320" height="400" alt="Paul LePage">
      </div>

      <div class="landing-buttons">
        <button class="start-btn blink" onclick="startGame()">[ PLAY NOW ]</button>
        <button class="share-btn" onclick="shareGame()">[ SHARE ]</button>
      </div>

      <div class="landing-desc">
        FORMER GOVERNOR <span class="hl">PAUL LePAGE</span> IS RUNNING FOR CONGRESS IN <span class="hl">MAINE'S 2ND DISTRICT</span>. THERE'S JUST ONE PROBLEM &mdash; <span class="warn">HE DOESN'T SEEM TO LIVE IN MAINE.</span><br><br>
        AS REPORTED IN THE PRESS HERALD, HIS PUBLIC MAINE ADDRESS IS ALSO A <span class="warn">BARBERSHOP</span> AND A <span class="warn">CAR RENTAL AGENCY</span>. NO WE ARE NOT MAKING THIS UP.<br><br>
        YOUR MISSION: USE PUBLIC RECORDS AND CLUES TO FIGURE OUT WHERE HE ACTUALLY LIVES. <span class="dim">(SPOILER: IT'S NOT MAINE.)</span>
      </div>

      <div class="paid-for">PAID FOR BY DUNLAP FOR CONGRESS</div>
      <div class="tm-notice">Not affiliated with or endorsed by Carmen Sandiego, HarperCollins, or Houghton Mifflin Harcourt.</div>
    </div>
  `;
}

function startGame() {
  currentRound = 0; score = 0; maineGuesses = 0; answered = false;
  window.scrollTo(0, 0);
  renderRound();
}

// ─── GAME ROUND ───
function renderRound() {
  answered = false;
  const round = ROUNDS[currentRound];
  const cluesHTML = round.clues.map(c => `<div class="clue-text"><span class="bullet">\u25ba</span> ${c}</div>`).join('');
  const buttonsHTML = round.locations.map(loc =>
    `<button class="location-btn" onclick="guess('${loc}', this)">\u25b8 ${loc.toUpperCase()}</button>`
  ).join('');

  document.getElementById('game').innerHTML = `
    <div class="title-bar">
      <h1>WHERE IN THE WORLD IS PAUL LePAGE?</h1>
    </div>
    <div class="globe-bar"></div>

    <div class="panel-row">
      <div class="panel narrow">
        <div class="panel-label">SUBJECT</div>
        <div class="dossier">
          <img src="${ROUND_PORTRAITS[currentRound]}" class="dossier-img" width="150" height="188" alt="Subject">
          <div class="dossier-info">
            NAME: <span class="val">LePAGE, PAUL</span><br>
            SEEKING: <span class="val">ME CD-2 SEAT</span><br>
            IN MAINE: <span class="alert">NO</span><br>
            STATUS: <span class="alert">NOT IN MAINE</span>
          </div>
        </div>
      </div>
      <div class="panel wide">
        <div class="panel-label">CLUES \u2014 ROUND ${currentRound + 1}</div>
        <div class="intel-panel">
          ${cluesHTML}
        </div>
      </div>
    </div>

    <div class="panel-row">
      <div class="panel map-panel">
        <div class="panel-label">WHERE IS HE?</div>
        <img src="${FLORIDA_ROUNDS[currentRound]}" class="florida-img" width="200" height="200" alt="Florida">
        <div class="map-caption">SIGNAL STRONG<br>SOMEWHERE WARM...</div>
      </div>
      <div class="panel wide choices-panel" id="answer-area">
        <div class="panel-label">WHERE DO YOU THINK HE IS?</div>
        ${buttonsHTML}
        <div id="result-area"></div>
      </div>
    </div>

    <div class="globe-bar"></div>
    <div class="bottom-bar">
      <div class="score-item"><button class="next-btn" onclick="window.scrollTo(0,0); renderTitleScreen()" style="font-size:10px; padding:8px 14px;">[ BACK ]</button></div>
      <div class="score-item">SCORE: <span class="val">${score}/${ROUNDS.length}</span></div>
      <div class="score-item">ROUND: <span class="val">${currentRound + 1}/${ROUNDS.length}</span></div>
      <div class="score-item">MAINE GUESSES: <span class="val">${maineGuesses}</span></div>
    </div>
    <div class="paid-for">PAID FOR BY DUNLAP FOR CONGRESS</div>
  `;
}

function guess(location, btn) {
  if (answered) return;
  answered = true;
  const round = ROUNDS[currentRound];
  const buttons = document.querySelectorAll('.location-btn');

  buttons.forEach(b => {
    b.style.pointerEvents = 'none';
    if (b.textContent.includes(round.answer.toUpperCase())) b.classList.add('correct');
  });

  let resultHTML = '';
  if (location === round.answer) {
    score++;
    btn.classList.add('correct');
    resultHTML = `<div class="result-text correct">${round.correctResponse}</div>`;
  } else if (location === 'Maine') {
    maineGuesses++;
    btn.classList.add('maine-wrong');
    resultHTML = `<div class="result-text maine">\ud83c\udfe0\u2702\ufe0f\ud83d\ude97 ${round.maineResponse}</div>`;
  } else {
    btn.classList.add('wrong');
    resultHTML = `<div class="result-text wrong">${round.wrongResponse}</div>`;
  }

  const resultArea = document.getElementById('result-area');
  const nextLabel = currentRound < ROUNDS.length - 1 ? '[ NEXT LEAD ]' : '[ CLOSE CASE ]';
  resultArea.innerHTML = `
    ${resultHTML}
    <div style="text-align:center; margin-top:10px;">
      <button class="next-btn" onclick="nextRound()">${nextLabel}</button>
    </div>
  `;
}

function nextRound() {
  currentRound++;
  window.scrollTo(0, 0);
  if (currentRound >= ROUNDS.length) renderEndScreen();
  else renderRound();
}

// ─── END SCREEN ───
function renderEndScreen() {
  let rating, ratingColor;
  if (score === 5) { rating = "MASTER DETECTIVE"; ratingColor = "#d4c84a"; }
  else if (score >= 3) { rating = "COMPETENT GUMSHOE"; ratingColor = "#5ab8b8"; }
  else { rating = "MAYBE TRY GOOGLE NEXT TIME"; ratingColor = "#d44a2e"; }

  let maineComment;
  if (maineGuesses === 0) maineComment = "You never once guessed Maine. Smart. You're already more aware of his location than most of Maine's CD-2 voters.";
  else if (maineGuesses === 1) maineComment = "You guessed Maine once. But you learned quick.";
  else if (maineGuesses <= 3) maineComment = `You guessed Maine ${maineGuesses} times. Each time, we checked his address and got another haircut. We're running out of hair.`;
  else maineComment = `You guessed Maine ${maineGuesses} times. We've now gotten so many haircuts at his listed address that the barber considers us family. The rental car agency made us sign up for their loyalty program. We're Gold Members so it wasn't a total waste.`;

  document.getElementById('game').innerHTML = `
    <div class="title-bar">
      <h1>CASE CLOSED</h1>
      <div class="sub">MAINE CD-2 RESIDENCY INVESTIGATION UNIT</div>
    </div>
    <div class="globe-bar"></div>

    <div class="panel-row">
      <div class="panel narrow">
        <div class="panel-label">CASE CLOSED</div>
        <div class="dossier">
          <div class="wanted-stamp" style="color:#1a6b4a;">FOUND</div>
          <img src="${END_PORTRAIT}" class="dossier-img" width="160" height="200" alt="FOUND" style="border-color:#1a6b4a; box-shadow: 0 0 10px rgba(26,107,74,0.5);">
          <div class="dossier-info">
            NAME: <span class="val">LePAGE, PAUL</span><br>
            LOCATED IN: <span class="val">FLORIDA</span><br>
            SURPRISE: <span class="alert">0%</span>
          </div>
        </div>
      </div>
      <div class="panel wide">
        <div class="panel-label">FINAL REPORT</div>
        <div style="padding-top:20px;">
          <div class="stat-line">SCORE: <span class="val">${score} / ${ROUNDS.length}</span></div>
          <div class="stat-line">RATING: <span style="color:${ratingColor}">${rating}</span></div>
          <div class="stat-line">TIMES YOU GUESSED MAINE: <span class="val">${maineGuesses}</span></div>
          <div class="epilogue">${maineComment}</div>
          <div class="epilogue" style="color:#d44a2e; border-color:#8b1a1a;">
            EPILOGUE: Former Governor LePage was confirmed to be at his Florida residence, where he has lived for years while running for Maine's CD-2 congressional seat. His official Maine address remains a fully operational barbershop and car rental agency. When reached for comment, the barber said: "Great tipper. When he's here. Which is never."
          </div>
        </div>
      </div>
      <div class="panel map-panel">
        <div class="panel-label">FINAL POSITION</div>
        <img src="${FLORIDA_ROUNDS[4]}" class="florida-img" width="220" height="220" alt="Florida">
        <div class="map-caption">PERMANENTLY LOCATED<br>IN FLORIDA</div>
      </div>
    </div>

    <div class="globe-bar"></div>
    <div class="bottom-bar" style="justify-content:center; gap:24px;">
      <button class="next-btn" onclick="window.scrollTo(0,0); renderTitleScreen()">[ PLAY AGAIN ]</button>
      <button class="share-btn" onclick="shareGame('I scored ${score}/${ROUNDS.length} finding Paul LePage! (He was in Florida. He\\'s always in Florida.) Play it yourself:')">[ SHARE RESULTS ]</button>
    </div>
    <div class="disclaimer">
      A PUBLIC SERVICE GAME. ALL CLUES ARE SATIRICAL.<br>
      ANY RESEMBLANCE TO AN ACTUAL CONGRESSIONAL CANDIDATE WHO DOESN'T LIVE IN HIS DISTRICT IS ENTIRELY INTENTIONAL.
    </div>
    <div class="paid-for">PAID FOR BY DUNLAP FOR CONGRESS</div>
  `;
}

renderTitleScreen();
</script>
</body>
</html>
