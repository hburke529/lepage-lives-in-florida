function shareGame(text) {
  const url = window.location.href;
  const shareText = text || "Can YOU find Governor LePage? (Spoiler: he's not in Maine.) Play 'Where in the World is Paul LePage?'";
  if (navigator.share) {
    navigator.share({ title: 'Where in the World is Paul LePage?', text: shareText, url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText + ' ' + url).then(() => {
      const toast = document.createElement('div');
      toast.className = 'share-toast';
      toast.textContent = 'LINK COPIED!';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }).catch(() => {});
  }
}

function shareGame(text) {
  const url = window.location.href;
  const shareText = text || "Can YOU find Governor LePage? (Spoiler: he's not in Maine.) Play 'Where in the World is Paul LePage?'";
  if (navigator.share) {
    navigator.share({ title: 'Where in the World is Paul LePage?', text: shareText, url: url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(shareText + ' ' + url).then(() => {
      const toast = document.createElement('div');
      toast.className = 'share-toast';
      toast.textContent = 'LINK COPIED!';
      document.body.appendChild(toast);
      setTimeout(() => toast.remove(), 2200);
    }).catch(() => {});
  }
}

let currentRound = 0;
let score = 0;
let maineGuesses = 0;
let answered = false;

function startGame() {
  currentRound = 0; score = 0; maineGuesses = 0; answered = false;
  renderRound();
}

// вФАвФАвФА GAME ROUND вФАвФАвФА
function renderRound() {
  answered = false;
  const round = ROUNDS[currentRound];
  const cluesHTML = round.clues.map(c => `<div class="clue-text"><span class="bullet">\u25ba</span> ${c}</div>`).join('');
  const buttonsHTML = round.locations.map(loc =>
    `<button class="location-btn" onclick="guess('${loc}', this)">\u25b8 ${loc.toUpperCase()}</button>`
  ).join('');

  document.getElementById('game').innerHTML = `
    <div class="title-bar">
      <h1>WHERE IN THE WORLD IS PAUL LePAGE?</h1>
    </div>
    <div class="globe-bar"></div>

    <div class="panel-row">

      <div class="score-item">MAINE GUESSES: <span class="val">${maineGuesses}</span></div>
    </div>
  `;
}

function guess(location, btn) {
  if (answered) return;
  answered = true;
  const round = ROUNDS[currentRound];
  const buttons = document.querySelectorAll('.location-btn');

  buttons.forEach(b => {
    b.style.pointerEvents = 'none';
    if (b.textContent.includes(round.answer.toUpperCase())) b.classList.add('correct');
  });

  let resultHTML = '';
  if (location === round.answer) {
    score++;
    btn.classList.add('correct');
    resultHTML = `<div class="result-text correct">${round.correctResponse}</div>`;
  } else if (location === 'Maine') {
    maineGuesses++;
    btn.classList.add('maine-wrong');
    resultHTML = `<div class="result-text maine">\ud83c\udfe0\u2702\ufe0f\ud83d\ude97 ${round.maineResponse}</div>`;
  } else {
    btn.classList.add('wrong');
    resultHTML = `<div class="result-text wrong">${round.wrongResponse}</div>`;
  }

  const answerArea = document.getElementById('answer-area');
  const nextLabel = currentRound < ROUNDS.length - 1 ? '[ NEXT LEAD ]' : '[ CLOSE CASE ]';
  answerArea.innerHTML += `
    ${resultHTML}
    <div style="text-align:center; margin-top:10px;">
      <button class="next-btn" onclick="nextRound()">${nextLabel}</button>
    </div>
  `;
}

function nextRound() {
  currentRound++;
  if (currentRound >= ROUNDS.length) renderEndScreen();
  else renderRound();
}

// вФАвФАвФА END SCREEN вФАвФАвФА

  if (score === 5) { rating = "MASTER DETECTIVE"; ratingColor = "#d4c84a"; }

  else { rating = "MAYBE TRY GOOGLE NEXT TIME"; ratingColor = "#d44a2e"; }

  document.getElementById('game').innerHTML = `

    </div>

}
